name: Worker Check

on:
  push:
    branches:
      - main
    paths:
      - apps/worker/**
      - package.json
      - package-lock.json
      - .github/workflows/worker-check.yml
  pull_request:
    paths:
      - apps/worker/**
      - package.json
      - package-lock.json
      - .github/workflows/worker-check.yml

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run typecheck
        run: npm run typecheck